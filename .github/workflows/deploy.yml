name: Deploy site

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create likes config from secret
        env:
          TOKEN: ${{ secrets.SUPPORTER_DISPATCH_TOKEN }}
        run: |
          node -e "const fs=require('fs'); fs.writeFileSync('likes-config.js', 'window.SFF_SUPPORTERS = { dispatchToken: ' + JSON.stringify(process.env.TOKEN || '') + ' };\\n');"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
