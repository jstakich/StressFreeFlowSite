name: Add supporter (automatic)

on:
  repository_dispatch:
    types: [add-supporter]

jobs:
  add-supporter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add supporter to site data
        run: python3 tools/add_supporter.py "${{ github.event.client_payload.name }}"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add supporter ${{ github.event.client_payload.name }}
          file_pattern: data/likes.json
